<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduino Nano ESP32</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Arduino Nano ESP32</h1>
    <p>Web Server Dashboard</p>
  </header>

  <main>
    <section class="card" id="status-card">
      <h2>สถานะอุปกรณ์</h2>
      <div class="info-grid">
        <div class="info-item">
          <span class="label">IP Address</span>
          <span class="value" id="ip">กำลังโหลด...</span>
        </div>
        <div class="info-item">
          <span class="label">WiFi Signal</span>
          <span class="value" id="rssi">กำลังโหลด...</span>
        </div>
        <div class="info-item">
          <span class="label">Uptime</span>
          <span class="value" id="uptime">กำลังโหลด...</span>
        </div>
        <div class="info-item">
          <span class="label">สถานะ</span>
          <span class="value status-ok" id="status">กำลังโหลด...</span>
        </div>
      </div>
      <button onclick="fetchStatus()">รีเฟรช</button>
    </section>

    <section class="card gpio-card">
      <h2>
        GPIO Control
        <span class="gpio-refresh-badge" id="gpio-countdown">โหลด...</span>
      </h2>
      <div class="gpio-legend">
        <span class="legend-dot dot-input"></span>INPUT
        <span class="legend-dot dot-output"></span>OUTPUT
        <span class="legend-dot dot-pullup"></span>PULLUP
      </div>
      <div class="gpio-grid" id="gpio-grid">
        <div class="gpio-loading">กำลังโหลด GPIO...</div>
      </div>
    </section>
  </main>

  <footer>
    <p>Arduino Nano ESP32 &mdash; PlatformIO + ESPAsyncWebServer</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
