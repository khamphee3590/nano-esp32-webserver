<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f7f7f7;
      --surface: #ffffff;
      --border:  #e4e4e4;
      --text:    #111111;
      --muted:   #888888;
      --dim:     #cccccc;
      --blue:    #2563eb;
      --green:   #15803d;
      --amber:   #b45309;
      --purple:  #6d28d9;
      --red:     #b91c1c;
      --cyan:    #0e7490;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    /* Navbar */
    .nav { height:52px; background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; gap:8px; }
    .nav-brand { display:flex; align-items:center; gap:6px; min-width:0; flex:1; }
    .nav-mark { font-size:.85rem; color:var(--muted); flex-shrink:0; }
    .nav-home { font-size:.875rem; font-weight:600; text-decoration:none; color:var(--text); flex-shrink:0; }
    .nav-home:hover { color:var(--muted); }
    .nav-sep { color:var(--dim); flex-shrink:0; }
    .nav-dev { font-size:.8rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nav-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .nav-dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    .nav-dot { animation:blink 2s infinite; }
    .nav-badge { font-size:.68rem; color:var(--muted); border:1px solid var(--border); padding:2px 7px; border-radius:4px; }
    .nav-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:0 12px; height:30px; border-radius:6px; cursor:pointer; font-size:.75rem; font-family:'Inter',sans-serif; transition:all .15s; white-space:nowrap; }
    .nav-btn:hover { color:var(--text); border-color:#aaa; }

    /* Layout */
    .body { display:flex; flex:1; overflow:hidden; }
    .sidebar { width:260px; flex-shrink:0; border-right:1px solid var(--border); padding:20px 16px; display:flex; flex-direction:column; gap:16px; overflow-y:auto; height:calc(100vh - 52px); position:sticky; top:52px; background:var(--surface); }
    .main { flex:1; padding:20px; overflow-y:auto; min-width:0; }

    /* Sidebar sections */
    .s-section { display:flex; flex-direction:column; gap:10px; }
    .s-title { font-size:.65rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }
    .s-divider { border:none; border-top:1px solid var(--border); margin:4px 0; }

    /* Status grid */
    .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .si { display:flex; flex-direction:column; gap:2px; }
    .si-lbl { font-size:.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .si-val { font-size:.82rem; font-weight:500; font-family:'JetBrains Mono',monospace; }
    .si-val.ok  { color:var(--green); }
    .si-val.err { color:var(--red); }
    .signal { display:flex; align-items:flex-end; gap:2px; height:12px; margin-top:2px; }
    .sb { width:3px; border-radius:1px; background:var(--dim); }
    .sb.on { background:var(--green); }
    .sb:nth-child(1){height:30%}.sb:nth-child(2){height:55%}.sb:nth-child(3){height:78%}.sb:nth-child(4){height:100%}
    .btn-refresh { width:100%; height:32px; background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; font-size:.75rem; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
    .btn-refresh:hover { color:var(--text); border-color:#aaa; }

    /* OTA */
    .ota-toggle { width:100%; background:none; border:none; padding:0; display:flex; align-items:center; justify-content:space-between; cursor:pointer; color:var(--muted); }
    .ota-toggle:hover { color:var(--text); }
    .ota-chev { font-size:.7rem; transition:transform .2s; }
    .ota-chev.open { transform:rotate(180deg); }
    .ota-sec { padding-top:12px; display:flex; flex-direction:column; gap:6px; }
    .ota-type { font-size:.68rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .ota-file-row { display:flex; align-items:center; gap:8px; }
    .btn-file { height:30px; padding:0 10px; background:none; border:1px solid var(--border); color:var(--muted); border-radius:5px; font-size:.72rem; cursor:pointer; white-space:nowrap; transition:all .15s; }
    .btn-file:hover { color:var(--text); border-color:#aaa; }
    .ota-fname { font-size:.7rem; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
    .ota-bar { height:2px; background:var(--border); border-radius:99px; overflow:hidden; }
    .ota-fill { height:100%; background:var(--blue); border-radius:99px; transition:width .3s; }
    .ota-fill.ok  { background:var(--green); }
    .ota-fill.err { background:var(--red); }
    .ota-status { font-size:.68rem; color:var(--muted); min-height:14px; }
    .btn-ota { width:100%; height:30px; background:none; border:1px solid var(--border); color:var(--muted); border-radius:5px; font-size:.75rem; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
    .btn-ota:hover:not(:disabled) { color:var(--text); border-color:#aaa; }
    .btn-ota:disabled { opacity:.35; cursor:not-allowed; }

    /* GPIO section */
    .gpio-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .gpio-title { font-size:.95rem; font-weight:600; }
    .gpio-meta { display:flex; align-items:center; gap:8px; }
    .gpio-stats { font-size:.72rem; color:var(--muted); }
    .countdown { font-size:.65rem; color:var(--dim); border:1px solid var(--border); padding:1px 6px; border-radius:3px; }
    .filter-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    .filter-tabs { display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; }
    .ftab { background:var(--surface); border:none; padding:0 12px; height:32px; font-size:.72rem; color:var(--muted); cursor:pointer; font-family:'Inter',sans-serif; border-right:1px solid var(--border); transition:all .15s; }
    .ftab:last-child { border-right:none; }
    .ftab:hover { color:var(--text); }
    .ftab.active { color:var(--text); font-weight:500; background:var(--bg); }
    .legend { display:flex; align-items:center; gap:10px; font-size:.65rem; color:var(--muted); }
    .ldot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:3px; }

    /* GPIO grid */
    .gpio-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }

    /* Pin card */
    .pin-card {
      background:var(--surface); border:1px solid var(--border); border-radius:8px;
      padding:12px; display:flex; flex-direction:column; gap:8px;
      border-left:2px solid transparent; transition:border-color .15s;
      animation:fadeUp .2s ease both;
    }
    .pin-card:hover { border-color:#bbb; }
    .pin-card.mi { border-left-color:var(--blue); }
    .pin-card.mo { border-left-color:var(--amber); }
    .pin-card.mp { border-left-color:var(--purple); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .pin-head { display:flex; justify-content:space-between; align-items:flex-start; gap:4px; }
    .pin-names { display:flex; flex-direction:column; gap:1px; min-width:0; flex:1; }
    .pin-primary { font-size:.82rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:text; border-radius:2px; }
    .pin-primary:hover { color:var(--blue); }
    .pin-secondary { font-size:.6rem; color:var(--blue); font-family:'JetBrains Mono',monospace; }
    .pin-hint { font-size:.58rem; color:var(--dim); }
    .pin-gpio { font-size:.58rem; color:var(--muted); font-family:'JetBrains Mono',monospace; background:var(--bg); border:1px solid var(--border); padding:1px 4px; border-radius:3px; flex-shrink:0; margin-top:1px; }
    .pin-modes { display:flex; gap:2px; }
    .mode-btn { flex:1; height:26px; font-size:.55rem; font-weight:600; font-family:'Inter',sans-serif; border-radius:4px; background:var(--bg); color:var(--muted); border:1px solid var(--border); cursor:pointer; transition:all .15s; }
    .mode-btn:hover:not(:disabled) { color:var(--text); background:var(--border); }
    .mode-btn:disabled { opacity:.3; cursor:not-allowed; }
    .mode-btn.m0 { background:#eff6ff; color:var(--blue); border-color:#bfdbfe; }
    .mode-btn.m1 { background:#fffbeb; color:var(--amber); border-color:#fde68a; }
    .mode-btn.m2 { background:#f5f3ff; color:var(--purple); border-color:#ddd6fe; }
    .toggle-btn { width:100%; height:32px; font-size:.78rem; font-weight:600; font-family:'Inter',sans-serif; border:1px solid var(--border); border-radius:6px; cursor:pointer; transition:all .15s; }
    .toggle-btn.hi { background:#f0fdf4; color:var(--green); border-color:#bbf7d0; }
    .toggle-btn.hi:hover { background:#dcfce7; }
    .toggle-btn.lo { background:var(--bg); color:var(--muted); }
    .toggle-btn.lo:hover { background:var(--border); color:var(--text); }
    .dig-dot { width:100%; height:32px; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:.72rem; font-weight:600; }
    .dot-hi { background:#f0fdf4; color:var(--green); }
    .dot-lo { background:var(--bg); color:var(--dim); }
    .analog-wrap { width:100%; display:flex; flex-direction:column; gap:3px; }
    .analog-val { font-size:.78rem; font-weight:600; color:var(--cyan); text-align:center; font-family:'JetBrains Mono',monospace; }
    .analog-bg { height:4px; background:var(--border); border-radius:99px; overflow:hidden; }
    .analog-fill { height:100%; background:var(--cyan); border-radius:99px; transition:width .4s; }
    .pin-edit { font-size:.82rem; font-weight:600; background:var(--bg); border:1px solid var(--blue); border-radius:3px; padding:1px 4px; width:100%; outline:none; font-family:'Inter',sans-serif; color:var(--text); }

    /* Settings modal */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.25); z-index:200; align-items:center; justify-content:center; padding:16px; }
    .overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:100%; max-width:400px; max-height:88vh; overflow-y:auto; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 0; }
    .modal-head h3 { font-size:.9rem; font-weight:600; }
    .btn-x { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:4px 6px; border-radius:4px; }
    .btn-x:hover { color:var(--text); }
    .modal-tabs { display:flex; padding:12px 20px 0; border-bottom:1px solid var(--border); }
    .mtab { background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:.8rem; padding:6px 14px; cursor:pointer; font-family:'Inter',sans-serif; margin-bottom:-1px; transition:all .15s; }
    .mtab:hover { color:var(--text); }
    .mtab.active { color:var(--text); border-bottom-color:var(--text); }
    .modal-body { padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
    .m-group { display:flex; flex-direction:column; gap:5px; }
    .m-label { font-size:.68rem; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .m-input { height:38px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:0 10px; font-size:.875rem; color:var(--text); font-family:'Inter',sans-serif; outline:none; transition:border-color .15s; }
    .m-input:focus { border-color:var(--text); }
    .m-select { height:38px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:0 10px; font-size:.82rem; color:var(--text); font-family:'Inter',sans-serif; outline:none; cursor:pointer; }
    .input-row { display:flex; gap:8px; }
    .input-row .m-input { flex:1; }
    .btn-save { height:38px; padding:0 14px; background:var(--text); color:#fff; border:none; border-radius:6px; font-size:.8rem; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity .15s; white-space:nowrap; }
    .btn-save:hover { opacity:.8; }
    .btn-full { width:100%; margin-top:4px; }
    .pcode { font-size:1.6rem; font-weight:600; letter-spacing:.25em; color:var(--blue); font-family:'JetBrains Mono',monospace; }
    .mono { font-family:'JetBrains Mono',monospace; font-size:.78rem; color:var(--muted); }
    .hint { font-size:.68rem; color:var(--dim); margin-top:2px; }
    .user-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); gap:8px; }
    .user-row:last-child { border:none; }
    .u-email { font-size:.82rem; }
    .u-role { font-size:.65rem; color:var(--muted); border:1px solid var(--border); padding:1px 6px; border-radius:3px; }
    .btn-rm { background:none; border:1px solid var(--border); color:var(--muted); padding:3px 8px; border-radius:4px; font-size:.7rem; cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s; }
    .btn-rm:hover { border-color:var(--red); color:var(--red); }
    .m-msg { font-size:.75rem; }
    .m-msg.ok  { color:var(--green); }
    .m-msg.err { color:var(--red); }

    /* Toast */
    #toasts { position:fixed; bottom:16px; right:16px; z-index:500; display:flex; flex-direction:column-reverse; gap:6px; pointer-events:none; }
    .toast { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:9px 14px; font-size:.78rem; color:var(--text); display:flex; align-items:center; gap:8px; opacity:0; transform:translateX(8px); transition:opacity .2s,transform .2s; pointer-events:auto; max-width:240px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
    .toast.show { opacity:1; transform:none; }

    .gpio-empty { color:var(--muted); text-align:center; padding:32px; font-size:.82rem; }
    footer { text-align:center; padding:14px; color:var(--dim); font-size:.68rem; border-top:1px solid var(--border); }

    @media(max-width:768px){
      .body{flex-direction:column}
      .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;flex-wrap:wrap;gap:12px;padding:14px}
      .sidebar .s-section{flex:1;min-width:160px}
      .main{padding:14px}
    }
    @media(max-width:480px){
      .gpio-grid{grid-template-columns:repeat(3,1fr)}
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="toasts" aria-live="polite"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const isLocalMode = !window.location.pathname.startsWith('/d/');
const ML = ['INPUT','OUTPUT','PULLUP'];

function showToast(msg, type) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  const t = type || 'ok';
  const col = t==='ok' ? 'var(--green)' : t==='err' ? 'var(--red)' : 'var(--muted)';
  el.innerHTML = '<span style="color:'+col+';font-size:.7rem">'+(t==='ok'?'✓':t==='err'?'✕':'·')+'</span><span>'+msg+'</span>';
  c.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => { el.classList.remove('show'); el.addEventListener('transitionend',()=>el.remove(),{once:true}); }, 2500);
}

function sig(r) { if(r>-60)return 4; if(r>-70)return 3; if(r>-80)return 2; return 1; }
function fmtUp(s) { return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m '+s%60+'s'; }

function Signal({ rssi }) {
  const b = sig(rssi);
  return <div className="signal">{[1,2,3,4].map(i=><div key={i} className={'sb'+(i<=b?' on':'')}></div>)}</div>;
}

function OtaSection({ label, type }) {
  const [name, setName] = useState('');
  const [file, setFile] = useState(null);
  const [pct, setPct]   = useState(0);
  const [msg, setMsg]   = useState('');
  const [cls, setCls]   = useState('');

  const upload = () => {
    if (!file) return;
    const form = new FormData();
    form.append('file', file);
    form.append('type', type);
    setMsg('กำลังอัพโหลด...'); setCls('');
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) { const p=Math.round(e.loaded/e.total*100); setPct(p); setMsg(p+'%'); }
    };
    xhr.onload = () => {
      if (xhr.status===200) { setPct(100); setMsg('สำเร็จ! กำลัง restart...'); setCls('ok'); showToast('OTA อัพโหลดสำเร็จ'); }
      else { setMsg('เกิดข้อผิดพลาด'); setCls('err'); }
    };
    xhr.onerror = () => { setMsg('เกิดข้อผิดพลาด'); setCls('err'); };
    xhr.open('POST', 'ota');
    xhr.send(form);
  };

  return (
    <div className="ota-sec">
      <div className="ota-type">{label}</div>
      <div className="ota-file-row">
        <label className="btn-file" htmlFor={'ota-'+type}>เลือก</label>
        <input type="file" id={'ota-'+type} accept=".bin" style={{display:'none'}}
          onChange={e=>{const f=e.target.files[0];setFile(f);setName(f?f.name:'');}} />
        <span className="ota-fname">{name||'ยังไม่ได้เลือก'}</span>
      </div>
      <div className="ota-bar"><div className={'ota-fill'+(cls?' '+cls:'')} style={{width:pct+'%'}}></div></div>
      <div className="ota-status" style={{color:cls==='ok'?'var(--green)':cls==='err'?'var(--red)':'var(--muted)'}}>{msg}</div>
      <button className="btn-ota" disabled={!file} onClick={upload}>อัพโหลด {label}</button>
    </div>
  );
}

function PinCard({ pin: p, onSet, canControl }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal]         = useState('');
  const inputRef = useRef();
  const mc = p.mode===0?'mi':p.mode===1?'mo':'mp';

  const startEdit = () => { if(!canControl)return; setVal(p.label||''); setEditing(true); setTimeout(()=>inputRef.current&&inputRef.current.focus(),10); };
  const commit = () => { onSet(p.name,'label',val.trim()); setEditing(false); };
  const cancel = () => setEditing(false);

  const renderVal = () => {
    if (p.mode===1) {
      if (canControl) return <button className={'toggle-btn '+(p.value?'hi':'lo')} onClick={()=>onSet(p.name,'toggle',null)}>{p.value?'HIGH':'LOW'}</button>;
      return <div className={'dig-dot '+(p.value?'dot-hi':'dot-lo')}>{p.value?'HIGH':'LOW'}</div>;
    }
    if (p.analog) {
      const pct = Math.round(p.value/4095*100);
      return <div className="analog-wrap"><span className="analog-val">{p.value}</span><div className="analog-bg"><div className="analog-fill" style={{width:pct+'%'}}></div></div></div>;
    }
    return <div className={'dig-dot '+(p.value?'dot-hi':'dot-lo')}>{p.value?'HIGH':'LOW'}</div>;
  };

  return (
    <div className={'pin-card '+mc}>
      <div className="pin-head">
        <div className="pin-names" onClick={startEdit}>
          {editing
            ? <input ref={inputRef} className="pin-edit" value={val}
                onChange={e=>setVal(e.target.value)}
                onBlur={commit}
                onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();commit();}if(e.key==='Escape')cancel();}} />
            : <span className="pin-primary">{p.label||p.name}</span>
          }
          {p.label&&!editing&&<span className="pin-secondary">{p.name}</span>}
          {!p.label&&!editing&&<span className="pin-hint">{canControl?'+ ชื่อ':''}</span>}
        </div>
        <span className="pin-gpio">GPIO{p.gpio}</span>
      </div>
      <div className="pin-modes">
        {[0,1,2].map(m=>(
          <button key={m} className={'mode-btn'+(p.mode===m?' m'+m:'')} disabled={!canControl} onClick={()=>onSet(p.name,'mode',m)} title={ML[m]}>{ML[m]}</button>
        ))}
      </div>
      <div style={{flex:1,display:'flex',alignItems:'stretch'}}>{renderVal()}</div>
    </div>
  );
}

function SettingsModal({ show, onClose, devName, onSaveName, isOwner }) {
  const [tab, setTab]   = useState('device');
  const [name, setName] = useState(devName);
  const [pcode, setPcode] = useState('------');
  const [devId, setDevId] = useState('-');
  const [users, setUsers] = useState([]);
  const [email, setEmail] = useState('');
  const [role, setRole]   = useState('editor');
  const [msg, setMsg]     = useState({text:'',cls:''});

  useEffect(() => {
    if (!show) return;
    setName(devName);
    if (!isLocalMode) {
      fetch('api/device/info').then(r=>r.json()).then(d=>{
        setName(d.name||devName);
        setPcode(d.pairing_code||'------');
        setDevId(d.device_id||'-');
      }).catch(()=>{});
      if (isOwner) fetch('api/device/users').then(r=>r.json()).then(setUsers).catch(()=>{});
    }
  }, [show]);

  const sm = (t,c) => { setMsg({text:t,cls:c}); setTimeout(()=>setMsg({text:'',cls:''}),3000); };

  const saveName = async () => {
    if (!isLocalMode) {
      await fetch('api/device/info',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
    }
    onSaveName(name); showToast('บันทึกชื่อแล้ว'); onClose();
  };

  const rmUser = async id => {
    await fetch('api/device/users/'+id,{method:'DELETE'});
    setUsers(u=>u.filter(x=>x.userId!==id)); showToast('ลบผู้ใช้แล้ว');
  };

  const invite = async () => {
    if (!email) { sm('กรุณาใส่อีเมล','err'); return; }
    const r = await fetch('api/device/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,role})}).then(r=>r.json());
    if (r.ok) { setUsers(u=>[...u,{userId:Date.now(),email,role}]); setEmail(''); sm('เชิญสำเร็จ','ok'); showToast('เชิญผู้ใช้สำเร็จ'); }
    else sm(r.error||'เกิดข้อผิดพลาด','err');
  };

  if (!show) return null;
  return (
    <div className="overlay show" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head"><h3>ตั้งค่าอุปกรณ์</h3><button className="btn-x" onClick={onClose}>✕</button></div>
        <div className="modal-tabs">
          <button className={'mtab'+(tab==='device'?' active':'')} onClick={()=>setTab('device')}>อุปกรณ์</button>
          {isOwner&&!isLocalMode&&<button className={'mtab'+(tab==='users'?' active':'')} onClick={()=>setTab('users')}>ผู้ใช้</button>}
        </div>
        {tab==='device'&&(
          <div className="modal-body">
            <div className="m-group">
              <label className="m-label">ชื่ออุปกรณ์</label>
              <div className="input-row"><input className="m-input" value={name} onChange={e=>setName(e.target.value)} /><button className="btn-save" onClick={saveName}>บันทึก</button></div>
            </div>
            <div className="m-group"><label className="m-label">Pairing Code</label><div className="pcode">{pcode}</div><div className="hint">ใช้เพื่อผูกอุปกรณ์กับบัญชีใหม่</div></div>
            <div className="m-group"><label className="m-label">Device ID</label><div className="mono">{devId}</div></div>
          </div>
        )}
        {tab==='users'&&isOwner&&(
          <div className="modal-body">
            <div className="m-group">
              <label className="m-label">ผู้ใช้</label>
              {users.map(u=>(
                <div key={u.userId} className="user-row">
                  <span className="u-email">{u.email}</span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span className="u-role">{u.role}</span>
                    {u.role!=='owner'&&<button className="btn-rm" onClick={()=>rmUser(u.userId)}>ลบ</button>}
                  </div>
                </div>
              ))}
            </div>
            <div className="m-group">
              <label className="m-label">เชิญผู้ใช้</label>
              <div className="input-row">
                <input className="m-input" type="email" placeholder="email@example.com" value={email} onChange={e=>setEmail(e.target.value)} />
                <select className="m-select" value={role} onChange={e=>setRole(e.target.value)}><option value="editor">Editor</option><option value="viewer">Viewer</option></select>
              </div>
              <button className="btn-save btn-full" onClick={invite}>เชิญ</button>
              {msg.text&&<div className={'m-msg '+msg.cls}>{msg.text}</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [pins, setPins]       = useState([]);
  const [status, setStatus]   = useState({ip:'...',rssi:0,uptime:0,status:'ok'});
  const [uptime, setUptime]   = useState(0);
  const [filter, setFilter]   = useState('all');
  const [showSettings, setSS] = useState(false);
  const [devName, setDevName] = useState('ESP32');
  const [countdown, setCD]    = useState(2);
  const [otaOpen, setOtaOpen] = useState(false);
  const [role, setRole]       = useState('owner');
  const gpioLoadingRef        = useRef(false);
  const statusLoadingRef      = useRef(false);
  const labelsRef             = useRef({});
  const labelsLoadedRef       = useRef(0);
  const canControl = role !== 'viewer';
  const isOwner    = role === 'owner';

  useEffect(() => {
    initApp();
    const gpioIv   = setInterval(loadGpio,   2000);
    const statusIv = setInterval(loadStatus, 5000);
    const uptimeIv = setInterval(() => setUptime(u => u + 1), 1000);
    return () => { clearInterval(gpioIv); clearInterval(statusIv); clearInterval(uptimeIv); };
  }, []);

  const initApp = async () => {
    if (!isLocalMode) {
      try {
        const d = await fetch('api/device/info').then(r=>r.json());
        setRole(d.role||'viewer');
        if (d.name) setDevName(d.name);
      } catch {}
    }
    loadStatus();
    loadGpio();
  };

  const loadStatus = async () => {
    if (statusLoadingRef.current) return;
    statusLoadingRef.current = true;
    try {
      const d = await fetch('api/status').then(r=>r.json());
      setStatus(d);
      setUptime(d.uptime||0);
      if (d.name) setDevName(d.name);
    } catch {}
    finally { statusLoadingRef.current = false; }
  };

  const loadLabels = async (force) => {
    if (isLocalMode) return labelsRef.current;
    const freshEnough = Date.now() - labelsLoadedRef.current < 15000;
    if (!force && freshEnough) return labelsRef.current;

    try {
      const rows = await fetch('api/gpio/labels').then(r=>r.json());
      const labels = {};
      if (Array.isArray(rows)) rows.forEach(l => { labels[l.pin_name] = l.label; });
      labelsRef.current = labels;
      labelsLoadedRef.current = Date.now();
    } catch {}

    return labelsRef.current;
  };

  const loadGpio = async () => {
    if (gpioLoadingRef.current) return;
    gpioLoadingRef.current = true;
    setCD(2);
    try {
      const [data, labels] = await Promise.all([
        fetch('api/gpio').then(r=>r.json()),
        loadLabels(false)
      ]);
      setPins((data.pins || []).map((p,i) => ({...p, label: labels[p.name]||'', _i:i})));
    } catch {}
    finally { gpioLoadingRef.current = false; }
    setTimeout(() => setCD(0), 100);
  };

  const handleSet = useCallback((pinName, action, val) => {
    setPins(prev => prev.map(p => {
      if (p.name !== pinName) return p;
      if (action === 'toggle') {
        const nv = p.value ? 0 : 1;
        fetch('api/gpio/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pinName,mode:p.mode,value:nv})});
        showToast(pinName+': '+(p.value?'HIGH→LOW':'LOW→HIGH'));
        return {...p, value: nv};
      }
      if (action === 'mode') {
        fetch('api/gpio/set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pinName,mode:val,value:p.value})});
        showToast(pinName+': '+ML[val]);
        return {...p, mode: val};
      }
      if (action === 'label') {
        labelsRef.current = {...labelsRef.current, [pinName]: val};
        labelsLoadedRef.current = Date.now();
        fetch('api/gpio/labels',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pinName,label:val})});
        showToast(val?'"'+val+'"':'ลบชื่อแล้ว');
        return {...p, label: val};
      }
      return p;
    }));
  }, []);

  const filtered = (() => {
    switch(filter) {
      case 'output': return pins.filter(p=>p.mode===1);
      case 'input':  return pins.filter(p=>p.mode!==1);
      case 'high':   return pins.filter(p=>p.mode===1&&p.value===1);
      default: return pins;
    }
  })();

  const outCount = pins.filter(p=>p.mode===1).length;
  const hiCount  = pins.filter(p=>p.mode===1&&p.value===1).length;

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>
      <nav className="nav">
        <div className="nav-brand">
          <span className="nav-mark">⚡</span>
          {!isLocalMode && <a href="/" className="nav-home">ESP32 Relay</a>}
          {!isLocalMode && <span className="nav-sep">›</span>}
          <span className="nav-dev">{devName}</span>
        </div>
        <div className="nav-right">
          <div className="nav-dot"></div>
          <span className="nav-badge">{isLocalMode ? 'Local' : 'Relay'}</span>
          {(canControl||isOwner) && <button className="nav-btn" onClick={()=>setSS(true)}>⚙ ตั้งค่า</button>}
          {!isLocalMode && <button className="nav-btn" onClick={()=>fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')}>ออก</button>}
        </div>
      </nav>

      <div className="body">
        <aside className="sidebar">
          <div className="s-section">
            <div className="s-title">สถานะ</div>
            <div className="status-grid">
              <div className="si"><span className="si-lbl">IP</span><span className="si-val" style={{fontSize:'.75rem'}}>{status.ip||'...'}</span></div>
              <div className="si">
                <span className="si-lbl">Signal</span>
                <div style={{display:'flex',alignItems:'center',gap:5,marginTop:2}}>
                  <Signal rssi={status.rssi||0}/>
                  <span style={{fontSize:'.68rem',color:'var(--muted)'}}>{status.rssi}</span>
                </div>
              </div>
              <div className="si"><span className="si-lbl">Uptime</span><span className="si-val" style={{fontSize:'.72rem'}}>{fmtUp(uptime)}</span></div>
              <div className="si"><span className="si-lbl">สถานะ</span><span className={'si-val '+(status.status==='ok'?'ok':'err')}>{status.status==='ok'?'Online':'Error'}</span></div>
            </div>
            <button className="btn-refresh" onClick={loadStatus}>รีเฟรช</button>
          </div>

          <hr className="s-divider"/>

          {isLocalMode && (
            <div className="s-section">
              <button className="ota-toggle" onClick={()=>setOtaOpen(o=>!o)}>
                <span className="s-title">OTA Update</span>
                <span className={'ota-chev'+(otaOpen?' open':'')}>▾</span>
              </button>
              <div className="ota-body" style={{maxHeight:otaOpen?'400px':'0',overflow:'hidden',transition:'max-height .25s ease'}}>
                <OtaSection label="Firmware" type="fw" />
                <OtaSection label="Filesystem" type="fs" />
              </div>
            </div>
          )}
          {!isLocalMode && (
            <div className="s-section">
              <div className="s-title" style={{color:'var(--dim)',fontSize:'.6rem'}}>OTA — ใช้ผ่าน Local IP เท่านั้น</div>
            </div>
          )}
        </aside>

        <main className="main">
          <div className="gpio-header">
            <span className="gpio-title">GPIO Control</span>
            <div className="gpio-meta">
              {outCount>0&&<span className="gpio-stats">{outCount} OUT · {hiCount} HIGH</span>}
              <span className="countdown">{countdown>0?countdown+'s':'...'}</span>
            </div>
          </div>

          <div className="filter-row">
            <div className="filter-tabs">
              {['all','output','input','high'].map((f,i)=>(
                <button key={f} className={'ftab'+(filter===f?' active':'')} onClick={()=>setFilter(f)}>
                  {['ทั้งหมด','OUTPUT','INPUT','HIGH'][i]}
                </button>
              ))}
            </div>
            <div className="legend">
              <span><span className="ldot" style={{background:'var(--blue)'}}></span>IN</span>
              <span><span className="ldot" style={{background:'var(--amber)'}}></span>OUT</span>
              <span><span className="ldot" style={{background:'var(--purple)'}}></span>PU</span>
            </div>
          </div>

          <div className="gpio-grid">
            {filtered.length===0
              ? <div className="gpio-empty">{pins.length===0?'กำลังโหลด GPIO...':'ไม่มีพินที่ตรงกัน'}</div>
              : filtered.map(p=>(
                  <PinCard key={p.name} pin={p} onSet={handleSet} canControl={canControl} />
                ))
            }
          </div>
        </main>
      </div>

      <footer>Arduino Nano ESP32 — PlatformIO + ESPAsyncWebServer</footer>
      <SettingsModal show={showSettings} onClose={()=>setSS(false)} devName={devName} onSaveName={n=>setDevName(n)} isOwner={isOwner} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
